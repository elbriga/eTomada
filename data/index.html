<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>eTomada</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        margin: 0;
      }

      header {
        padding: 20px;
        font-size: 24px;
        text-align: center;
        background: #1e293b;
        font-weight: bold;
      }

      .container {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        padding: 20px;
      }

      .card {
        background: #1e293b;
        border-radius: 12px;
        padding: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }

      .title {
        font-size: 18px;
        margin-bottom: 10px;
      }

      .status {
        margin-bottom: 10px;
        font-weight: bold;
      }

      .on {
        color: #22c55e;
      }

      .off {
        color: #ef4444;
      }

      input {
        width: 100%;
        padding: 8px;
        border-radius: 6px;
        border: none;
        margin-bottom: 10px;
        background: #0f172a;
        color: white;
      }

      button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        background: #3b82f6;
        color: white;
        font-weight: bold;
        cursor: pointer;
      }

      button:hover {
        background: #2563eb;
      }

      .small {
        font-size: 12px;
        opacity: 0.7;
      }
    </style>
  </head>

  <body>
    <header>
      ⚡ eTomada
      <div style="font-size: 14px; margin-top: 5px" id="datahora">--</div>
      <button onclick="load()" style="margin-top: 10px; width: 120px">
        🔄 Reload
      </button>
    </header>

    <div class="container" id="reles"></div>

    <script>
      const API_BASE =
        window.location.protocol === "file:"
          ? "http://192.168.18.105" // TODO : remover
          : window.location.origin;

      async function load() {
        try {
          const res = await fetch(`${API_BASE}/data`);
          const data = await res.json();

          document.getElementById("datahora").innerHTML = data.datahorastr;

          const container = document.getElementById("reles");
          container.innerHTML = "";

          data.reles.forEach((r, i) => {
            if (!r.nome) r.nome = "---";

            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
<div class="title">${r.nome}</div>
<div class="status ${r.estado ? "on" : "off"}">
    ${r.estado ? "● Ligado" : "● Desligado"}
</div>

<input id="regra-${i}" value="${r.regra || ""}" placeholder="ON=08:00-18:00">

<button onclick="salvar(${i}, this)">Salvar</button>
<div class="small">Rele ${i + 1} (pino ${r.pino})</div>
`;

            container.appendChild(card);
          });
        } catch (e) {
          console.error("Erro ao carregar:", e);
        }
      }

      async function salvar(i, btn) {
        const input = document.getElementById(`regra-${i}`);
        const regra = input.value;

        btn.innerText = "Salvando...";
        btn.disabled = true;

        try {
          await fetch(`${API_BASE}/setReleConfig/${i + 1}?regra=${regra}`);
        } catch (e) {
          alert("Erro ao salvar");
        }

        btn.innerText = "Salvar";
        btn.disabled = false;

        load();
      }

      load();
      //setInterval(load, 5000);
    </script>
  </body>
</html>
