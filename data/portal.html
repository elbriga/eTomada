<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>eTomada Setup</title>
    <style>
      body {
        background: #0f172a;
        color: white;
        font-family: Arial;
        padding: 20px;
      }

      .card {
        background: #1e293b;
        border-radius: 10px;
        padding: 20px;
        max-width: 400px;
        margin: auto;
      }

      input,
      select,
      button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 6px;
        border: none;
        box-sizing: border-box;
      }

      button {
        background: #2563eb;
        color: white;
        font-weight: bold;
      }

      .small {
        opacity: 0.7;
        font-size: 12px;
      }
    </style>

    <script>
      function setStatus(msg) {
        const status = document.getElementById("status");
        status.innerHTML = msg;
      }

      async function salvar() {
        const ssid = document.getElementById("ssid").value;
        if (!ssid) {
          // TODO alert("Selecione uma rede");
          return;
        }
        const pass = document.getElementById("pass").value;

        setStatus("Salvando...");
        try {
          const res = await fetch("/api/setWiFiConfig", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              ssid,
              pass,
            }),
          });

          if (!res.ok) {
            throw new Error();
          }

          setStatus("Configuração salva.<br>Reiniciando dispositivo...");
        } catch (e) {
          setStatus("Erro ao salvar configuração");
        }
      }

      let tentativas = 0;
      async function loadRedes() {
        setStatus("Carregando...");

        const select = document.getElementById("ssid");
        select.innerHTML = "<option>Buscando redes...</option>";
        try {
          const res = await fetch("/api/redes");
          if (!res.ok) {
            throw new Error();
          }

          const data = await res.json();

          if (data.scanning) {
            select.innerHTML = "<option>Buscando redes...</option>";
            if (tentativas++ < 30) {
              setTimeout(loadRedes, 1000);
            } else {
              setStatus("Timeout ao buscar redes");
            }
            return;
          }

          select.innerHTML = "";
          data.redes.forEach((rede) => {
            const opt = document.createElement("option");
            opt.value = rede.ssid;
            opt.innerText = `${rede.ssid} (${rede.rssi} dBm)`;
            select.appendChild(opt);
          });

          if (!data.redes.length) {
            select.innerHTML = "<option>Nenhuma rede encontrada</option>";
          }

          setStatus("Selecione a rede");
        } catch (e) {
          setStatus("Erro ao buscar redes!");
        }
      }

      function escapeHtml(str) {
        return str
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      window.addEventListener("load", loadRedes);
    </script>
  </head>
  <body>
    <div class="card">
      <h2>⚡ eTomada Setup</h2>
      <div class="small">Configure sua rede WiFi</div>
      <br />
      <select id="ssid"></select>
      <input id="pass" type="password" placeholder="Senha WiFi" />
      <button onclick="salvar()">Conectar</button>
      <br />
      <br />
      <div id="status"></div>
    </div>
  </body>
</html>
